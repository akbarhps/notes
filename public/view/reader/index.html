<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/markdown-it/12.3.2/markdown-it.min.js"
            integrity="sha512-TIDbN32lXOg2Mw1VcnKrQLZgfALryJogWCu/NHWtlMCR1jget+mOwMtdehBBZz2f9PKeK2AQPwVxkbl4u/1H5g=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script src="https://code.jquery.com/jquery-3.6.3.slim.min.js"></script>
    <script src="/lib/lazysizes.min.js"></script>
    <script src="/lib/apiresolver.js"></script>

    <link rel="stylesheet" href="/styles/global-style.css">
    <link rel="stylesheet" href="/styles/markdown-style.css">
    <link rel="stylesheet" href="/styles/reader-style.css">
    <link rel="shortcut icon" href="#" type="image/x-icon">
    <title>Note</title>
</head>
<body>

<div id="floating-buttons-container" class="float no-select">
    <div id="delete-post" class="floating-button" title="Delete Post">💥</div>
    <div id="edit-post" class="floating-button" title="Edit Post">📝</div>
</div>

<div id="image-preview-container" class="float no-select" style="display: none">
    <div id="image-preview-dismiss-section" class="float"></div>
    <img id="image-preview-content" class="float" src="" alt="">
    <p id="image-preview-title" class="float"></p>
</div>

<div class="content-container">
    <article class="letter-container">
        <div id="letter-meta" class="letter-meta">
            <div id="meta-date" class="letter-meta__date"></div>
            <div id="meta-title" class="letter-meta__title"></div>
        </div>
        <div id="letter-body" class="letter-body md"></div>
    </article>

    <div id="letter-footer" class="letter-footer">Akbar's Note</div>
</div>

<script>
    const markdownIt = window.markdownit({html: true, linkify: true});
    const deletePost = document.querySelector('#delete-post');
    const editPost = document.querySelector('#edit-post');

    const url = new URL(window.location);
    const urlSplit = url.pathname.split('/');
    const postId = urlSplit[urlSplit.length - 1];

    editPost.addEventListener('click', () => {
        window.location.href = '/posts/create?id=' + postId;
    });

    deletePost.addEventListener('click', async () => {
        const res = await fetch(`/api/v1/posts/${postId}`, {
            method: "DELETE",
            headers: {
                "Content-Type": "application/json"
            }
        });
        const jsonRes = await res.json();
        if (jsonRes['code'] === 200) {
            window.location.href = '/';
            return;
        }

        console.log(jsonRes);
        alert(jsonRes['message']);
    });

    function setContentMetadata(metadata) {
        document.title = metadata['title'];

        $('#meta-date').text(metadata['createdAt']);
        $('#meta-title').text(metadata['title']);
        $('#meta-description').text(metadata['title']);
        $('#letter-body').html(markdownIt.render(metadata['content']));
    }

    (async () => {
        const res = await fetch(`/api/v1/posts/${postId}`);
        const jsonData = await res.json();
        if (jsonData['code'] === 404) {
            window.location.href = '/';
            return;
        }

        setContentMetadata(jsonData['data']);
    })();
</script>
</body>
</html>
