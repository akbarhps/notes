<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Akbar's Notes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100;8..144,200;8..144,300;8..144,400;8..144,500;8..144,600;8..144,700;8..144,800;8..144,900;8..144,1000&family=Roboto+Mono:wght@300&family=Source+Serif+Pro:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700;1,900&display=swap');

        :root {
            --default-font-family: "Roboto Flex", 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            --default-font-size: 1rem;
            --default-font-color: #424242;
            --default-font-weight: 300;
        }

        #floating-buttons-container {
            width: max-content;
            height: max-content;
            bottom: 40px;
            right: 40px;
            position: fixed;
        }

        .floating-button {
            font-size: 3rem;
            cursor: pointer;
            transition: transform 0.2s ease-in-out;
        }

        .floating-button:hover {
            transform: scale(1.4);
        }

        .floating-button:active {
            transform: scale(1.1);
        }

        table {
            --items-padding: 1rem;

            width: 100%;
            border-color: grey;
            border-spacing: 2px;
            border-collapse: collapse;
            text-align: left;
            vertical-align: center;
            font-size: var(--default-font-size);
            font-family: var(--default-font-family);
        }

        th {
            padding: var(--items-padding);
            border: none;
            font-weight: normal;
            font-family: var(--header-font-family);
        }

        td {
            padding: var(--items-padding);
            border-top: 1px solid #dee2e6;
            font-size: var(--default-font-size);
            font-weight: var(--default-font-weight);
        }

        table {
            width: 100%;
        }

        tbody > tr:hover {
            background-color: #ddd;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="floating-buttons-container" class="float no-select">
    <div id="create-post" class="floating-button" title="Create Post!">📝</div>
</div>

<table>
    <thead id="tableHead">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Created At</th>
        <th>Updated At</th>
    </tr>
    </thead>

    <tbody id="tableBody"></tbody>
</table>

<script>
    const createPost = document.querySelector('#create-post');
    const tableBody = document.getElementById('tableBody');
    const urlParams = new URLSearchParams(window.location.search)
    const page = urlParams.get('page') || 0;
    const limit = urlParams.get('limit') || 1000;

    createPost.addEventListener('click', () => {
        window.location.href = '/posts/create';
    });

    async function getPosts() {
        const res = await fetch('/api/v1/posts?page=' + page + '&limit=' + limit);
        return res.json();
    }

    (async () => {
        const jsonData = await getPosts();
        jsonData.data.forEach((post) => {
            const tr = document.createElement('tr');
            const tdId = document.createElement('td');
            const tdTitle = document.createElement('td');
            const tdCreatedAt = document.createElement('td');
            const tdUpdatedAt = document.createElement('td');

            tdId.innerText = post['id'];
            tdTitle.innerText = post['title'];
            tdCreatedAt.innerText = post['createdAt'];
            tdUpdatedAt.innerText = post['updatedAt'];

            tr.appendChild(tdId);
            tr.appendChild(tdTitle);
            tr.appendChild(tdCreatedAt);
            tr.appendChild(tdUpdatedAt);

            tr.addEventListener('click', () => {
                window.location.href = '/posts/' + post['id'];
            });
            tableBody.appendChild(tr);
        });
    })();
</script>

</body>
</html>
